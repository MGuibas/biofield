name: frontend
description: BioField - App para biólogos de campo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.6.3

  # HTTP
  dio: ^5.7.0

  google_sign_in: ^6.2.1

  # Almacenamiento seguro (tokens)
  flutter_secure_storage: ^9.2.2

  # Base de datos local
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # GPS
  geolocator: ^13.0.2

  # Mapas
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Permisos
  permission_handler: ^11.3.1

  # Imágenes
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  uuid: ^4.5.2
  flutter_local_notifications: ^20.1.0
  shared_preferences: ^2.5.4
  flutter_map_marker_cluster: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
