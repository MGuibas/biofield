services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: biofield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=biofield;Username=postgres;Password=yourpassword
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
      - Minio__Bucket=biofield
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=http://localhost:4173
      - Cors__AllowedOrigins__2=http://localhost:3000
      - Cors__AllowedOrigins__3=https://biofield.guibas.es
    depends_on:
      - postgres
      - minio
    volumes:
      - api-avatars:/app/wwwroot/avatars

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  api-avatars:
